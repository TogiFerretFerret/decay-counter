<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>decay — pp counter (minimal)</title>
		<link rel="stylesheet" href="css/theme.css" />
		<link rel="stylesheet" href="css/odometr.css" />
		<link rel="stylesheet" href="css/counter.css" />
		<link rel="stylesheet" href="css/hit-judgements.css" />
	</head>
	<body>
		<div id="app" class="state-menu">
			<div id="bg"></div>
			<div id="scrim"></div>

			<div class="card">
				<div class="top">
					<div class="titles">
						<div class="marquee" id="title-wrap"><span class="title" id="title">no map</span></div>
						<div class="sub">
							<span class="diff" id="diff">—</span>
							<span class="dot">·</span>
							<span class="mapper" id="mapper">—</span>
						</div>
					</div>
					<div class="top-right">
						<div class="mods" id="mods"></div>
						<div class="sr" id="sr-badge"><span id="sr">0.00</span><i>★</i></div>
					</div>
				</div>

				<div class="hero">
					<div class="pp-group">
						<div class="pp"><span class="pp-cur" id="pp">0</span><span class="pp-unit">pp</span></div>
						<div class="pp-mini">
							<div class="mini mini-max"><b id="ppmax">0</b><i>max curr</i></div>
							<div class="mini mini-fc"><b id="ppfc">0</b><i>if fc</i></div>
						</div>
					</div>
					<div class="hero-right">
						<div class="judge">
							<span class="j good" id="h100">0</span>
							<span class="j ok" id="h50">0</span>
							<span class="j bad" id="h0">0</span>
							<span class="j sb" id="sb">0</span>
						</div>
						<div class="tagline" id="tagline">isthatdecay</div>
					</div>
				</div>
			</div>

			<!-- present so the shared main.js can address them, but not shown in the
			     minimal layout (hidden via .hidden-bin) -->
			<div class="hidden-bin" aria-hidden="true">
				<span id="artist"></span>
				<span id="rank"></span>
				<span id="acc"></span>
				<span id="combo"></span>
				<span id="bpm"></span>
				<span id="ar"></span>
				<span id="cs"></span>
				<span id="od"></span>
				<span id="hp"></span>
				<span class="ur-stat" id="ur-stat"><span id="ur"></span></span>
				<div class="identity">
					<div class="avatar" id="avatar"><span id="avatar-initial">?</span></div>
					<span id="pname"></span>
					<span id="prank"></span>
					<span id="ppp"></span>
					<div id="session">
						<span id="sess-gain"></span>
						<span id="sess-plays"></span>
					</div>
				</div>
				<canvas id="graph"></canvas>
				<div id="hit-judgements"></div>
			</div>

			<script src="js/odometr.js"></script>
			<script src="js/countUp.js"></script>
			<script type="module" src="js/main.js"></script>
		</div>
	</body>
</html>
