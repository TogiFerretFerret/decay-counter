<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<title>opt C</title>
		<link rel="stylesheet" href="../css/theme.css" />
		<link rel="stylesheet" href="../css/counter.css" />
		<style>
			#bg { background: linear-gradient(135deg, #3a2f6b, #7a3b6e 55%, #2b4a7a); }
			/* move acc/combo/judge up onto the map row's right side */
			.map { justify-content: flex-start; }
			.map .side { margin-left: auto; display: flex; align-items: baseline; gap: 9px; }
			.map .rank { font-size: 14px; font-weight: 900; }
			.map .acc { font-size: 14px; font-weight: 700; }
			.map .combo { font-size: 14px; font-weight: 700; color: var(--text-dim); }
			.map .acc i, .map .combo i { font-style: normal; font-size: 10px; color: var(--text-dim); }

			.perf { justify-content: space-between; align-items: flex-end; }
			.pp-row { display: flex; align-items: baseline; gap: 14px; }
			.pp-cell { display: flex; flex-direction: column; align-items: flex-start; line-height: 1; }
			.pp-cell b { font-size: 30px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; color: var(--text); }
			.pp-cell.hero b { color: var(--accent); font-size: 38px; }
			.pp-cell i { font-style: normal; font-size: 9.5px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); margin-top: 4px; }
			.judge { margin-bottom: 3px; }
		</style>
	</head>
	<body>
		<div id="app" class="state-play">
			<div id="bg" class="show"></div>
			<div id="scrim"></div>
			<div class="card">
				<div class="row song">
					<div class="titles">
						<div class="marquee"><span class="title">Camellia - Ghost feat. Nanahira</span></div>
						<div class="diff">Haunting · riverxia</div>
					</div>
					<div class="mods"><span class="mod">HD</span><span class="mod">DT</span></div>
				</div>
				<div class="row map">
					<div class="sr" style="background:#5f5ed9;color:#fff"><span>6.83</span><i>★</i></div>
					<div class="stat"><label>BPM</label><span>174</span></div>
					<div class="stat"><label>AR</label><span style="color:var(--bad)">9.5</span></div>
					<div class="stat"><label>CS</label><span>4</span></div>
					<div class="stat"><label>OD</label><span style="color:var(--bad)">9</span></div>
					<div class="stat"><label>HP</label><span>5</span></div>
					<div class="side">
						<span class="rank" data-rank="S">S</span>
						<span class="acc">99.13<i>%</i></span>
						<span class="combo">558<i>x</i></span>
					</div>
				</div>
				<div class="row perf">
					<div class="pp-row">
						<div class="pp-cell hero"><b>301</b><i>now</i></div>
						<div class="pp-cell"><b>468</b><i>max</i></div>
						<div class="pp-cell"><b>512</b><i>fc</i></div>
					</div>
					<div class="judge">
						<span class="j good">8</span>
						<span class="j ok">1</span>
						<span class="j bad">2</span>
						<span class="j ur">132<i>ur</i></span>
					</div>
				</div>
			</div>
			<div class="progress"><div class="progress-fill" style="width:62%"></div></div>
		</div>
	</body>
</html>
